{% extends 'base.html' %}{% block content %}<section class="hero"><div><span class="eyebrow">TELEMETRIA</span><h1>Histórico</h1><p>Uma leitura clara do seu ritmo.</p></div></section><section class="dashboard-grid"><div class="stat"><span>Total concluído</span><b>{{stats.completed}}</b></div><div class="stat"><span>Sequência atual</span><b>{{stats.streak}} dias</b></div><div class="stat"><span>Recorde</span><b>{{stats.record}} dias</b></div></section><div class="panel chart-panel"><h2>Conclusões nos últimos 7 dias</h2><canvas id="historyChart" data-chart="{{ chart|tojson|forceescape }}" data-labels="{{ labels|tojson|forceescape }}"></canvas></div>{% endblock %}
