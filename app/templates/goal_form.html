{% extends 'base.html' %}{% block content %}<section class="form-wrap"><a href="{{url_for('goals.index')}}">← Voltar</a><h1>{{'Editar' if goal else 'Nova'}} meta</h1><p>Defina o próximo ponto no seu mapa estelar.</p><form method="post" class="panel goal-form"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><label>Título<input name="title" required value="{{goal.title if goal else ''}}" placeholder="Ex.: Finalizar capítulo 3"></label><label>Descrição<textarea name="description" placeholder="Uma nota opcional">{{goal.description if goal and goal.description else ''}}</textarea></label><label class="toggle deadline-toggle" for="has-deadline"><span class="toggle-switch"><input id="has-deadline" type="checkbox" name="has_deadline" {% if not goal or goal.has_deadline %}checked{% endif %}><span class="toggle-track"><span class="toggle-thumb"></span></span></span><span class="toggle-text">Esta meta tem prazo para concluir</span></label><div id="deadline-fields"><div class="two"><label>Data<input type="date" name="date" value="{{goal.date.isoformat() if goal and goal.date else ''}}"></label><label>Horário<input type="time" name="time" value="{{goal.time.strftime('%H:%M') if goal and goal.time else ''}}"></label></div><label>Repetição<select name="recurrence_type"><option value="none">Não repetir</option><option value="weekdays">Dias úteis</option><option value="weekends">Finais de semana</option><option value="count">Por quantidade de dias</option><option value="forever">Todos os dias continuamente</option></select></label><div class="two"><label>Quantidade de dias<input type="number" min="1" name="recurrence_days" value="{{goal.recurrence_days if goal and goal.recurrence_days else ''}}"></label><label>Até a data<input type="date" name="recurrence_end_date" value="{{goal.recurrence_end_date.isoformat() if goal and goal.recurrence_end_date else ''}}"></label></div></div><p id="no-deadline-help" class="field-help">Esta meta ficará na sua lista geral, sem aparecer como atrasada ou prevista para hoje.</p><div class="two"><label>Prioridade<select name="priority">{% for x in ['baixa','media','alta'] %}<option value="{{x}}" {% if goal and goal.priority==x %}selected{% endif %}>{{x|capitalize}}</option>{% endfor %}</select></label><label>Categoria<select name="category">{% for c in categories %}<option value="{{c}}" {% if goal and goal.category==c %}selected{% endif %}>{{c|capitalize}}</option>{% endfor %}</select></label></div><label>Status<select name="status">{% for x in ['pendente','em_andamento','concluida'] %}<option value="{{x}}" {% if goal and goal.status==x %}selected{% endif %}>{{x.replace('_',' ')|capitalize}}</option>{% endfor %}</select></label><button>Salvar meta <i class="bi bi-rocket-takeoff"></i></button></form></section>{% endblock %}
