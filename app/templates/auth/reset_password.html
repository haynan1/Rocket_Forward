{% extends 'base.html' %}
{% block content %}<section class="auth"><div class="rocket-orb">🔐</div><h1>Nova senha</h1><p>Escolha uma senha com pelo menos 8 caracteres.</p><form method="post" class="panel"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><label>Nova senha<input type="password" name="password" minlength="8" autocomplete="new-password" required></label><label>Repita a nova senha<input type="password" name="password_confirmation" minlength="8" autocomplete="new-password" required></label><button>Salvar nova senha</button></form></section>{% endblock %}
